        <div class="content markdown">
            <p>这是一个我自己做的小游戏：</p>
<p>鼠标点击操控三角形，切除或躲避从四周扔来的炸弹，不被炸到即可</p>
<p>游戏共25关，每5关会出现一种新的敌人，默认模式下按住鼠标会有缓时效果，难度不大</p>
<p>鼠标右键打开设置，可以开启release模式，取消缓时（难度较高，欢迎挑战！</p>
<p>欢迎体验，游戏愉快 ^_^</p>
